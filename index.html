<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product card</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Fraunces:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
  <div class="card">
    <picture>
      <source srcset="image-product-mobile.jpg" media="(max-width: 600px)">
      <img src="image-product-desktop.jpg" alt="Perfume">
    </picture>
    <div class="content">
      <p class="category">PERFUME</p>
      <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>
      <div class="price">
        <span class="new-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>
      <button class="btn">
         Add to Cart
      </button>
    </div>
  </div>
</main>
</body>
</html>
